<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TS座標計算</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      max-width: 520px;
      margin: auto;
      line-height: 1.5;
      background: #ffffff;
      color: #111;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 14px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 16px;
      box-sizing: border-box;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #fff;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 17px;
      border: none;
      border-radius: 8px;
      background: #222;
      color: #fff;
      cursor: pointer;
    }

    button.secondary {
      background: #666;
    }

    button.danger {
      background: #8b1e1e;
    }

    .menu-button {
      margin-bottom: 12px;
      font-size: 18px;
      padding: 14px;
    }

    .result {
      margin-top: 18px;
      padding: 12px;
      border: 1px solid #ccc;
      background: #f8f8f8;
      border-radius: 8px;
    }

    .big {
      font-size: 22px;
      font-weight: bold;
      line-height: 1.8;
      margin-bottom: 10px;
    }

    .small {
      font-size: 14px;
      color: #555;
      line-height: 1.7;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .note {
      margin-top: 10px;
      color: #555;
      font-size: 13px;
    }

    .success {
      color: #0b6b2a;
      font-weight: bold;
      font-size: 15px;
      margin-top: 10px;
    }

    .error {
      color: #b00020;
      font-weight: bold;
      font-size: 16px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .top-actions button {
      margin-top: 0;
    }

    .dms-row {
      display: flex;
      gap: 8px;
      align-items: end;
    }

    .dms-col {
      flex: 1;
    }

    .dms-col label {
      margin-top: 0;
      font-weight: normal;
      font-size: 14px;
      color: #555;
    }

    .coord-row {
      display: flex;
      gap: 8px;
      align-items: end;
      margin-bottom: 0;
    }

    .coord-col {
      flex: 1;
    }

    .coord-col label {
      margin-top: 0;
      font-weight: normal;
      font-size: 14px;
      color: #555;
    }

    .coord-z label {
      font-weight: normal;
      font-size: 14px;
      color: #555;
    }

    .hidden-file-input {
      display: none;
    }

    .list-buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .list-buttons button {
      margin-top: 0;
    }
  </style>
</head>
<body>

  <!-- ホーム画面 -->
  <section id="homeScreen" class="screen active">
    <h1>TSツール</h1>
    <button class="menu-button" onclick="openCalcScreen()">TS計算座標</button>
    <button class="menu-button" onclick="showListScreen()">リスト表示</button>
    <button class="menu-button" onclick="showScreen('exportScreen')">リストエクスポート</button>
    <button class="menu-button" onclick="showScreen('importScreen')">リストインポート</button>
    <div class="note">
      ※ スマホ内に保存します。<br>
      ※ CSVインポートは追加です。既存データは消えません。
    </div>
  </section>

  <!-- 計算画面 -->
  <section id="calcScreen" class="screen">
    <div class="top-actions">
      <button class="secondary" onclick="showScreen('homeScreen')">ホームへ戻る</button>
    </div>

    <h2>TS計算座標</h2>

    <label>点名</label>
    <input id="pointName" type="text" placeholder="例: A1" />

    <label>器械点（リストから選択）</label>
    <select id="instSelect" onchange="applySelectedPoint('inst')">
      <option value="">選択してください</option>
    </select>

    <label>器械点</label>
    <div class="coord-row">
      <div class="coord-col">
        <label for="x0">X（北）</label>
        <input id="x0" type="number" step="any" />
      </div>
      <div class="coord-col">
        <label for="y0">Y（東）</label>
        <input id="y0" type="number" step="any" />
      </div>
    </div>
    <div class="coord-z">
      <label for="z0">Z</label>
      <input id="z0" type="number" step="any" />
    </div>

    <label>後視点（リストから選択）</label>
    <select id="bsSelect" onchange="applySelectedPoint('bs')">
      <option value="">選択してください</option>
    </select>

    <label>後視点</label>
    <div class="coord-row">
      <div class="coord-col">
        <label for="xb">X（北）</label>
        <input id="xb" type="number" step="any" />
      </div>
      <div class="coord-col">
        <label for="yb">Y（東）</label>
        <input id="yb" type="number" step="any" />
      </div>
    </div>

    <label>挟角</label>
    <div class="dms-row">
      <div class="dms-col">
        <label for="angleDeg">度</label>
        <input id="angleDeg" type="number" step="1" placeholder="度" />
      </div>
      <div class="dms-col">
        <label for="angleMin">分</label>
        <input id="angleMin" type="number" step="1" placeholder="分" />
      </div>
      <div class="dms-col">
        <label for="angleSec">秒</label>
        <input id="angleSec" type="number" step="any" placeholder="秒" />
      </div>
    </div>

    <label>鉛直角（上0°）</label>
    <div class="dms-row">
      <div class="dms-col">
        <label for="zenDeg">度</label>
        <input id="zenDeg" type="number" step="1" placeholder="度" />
      </div>
      <div class="dms-col">
        <label for="zenMin">分</label>
        <input id="zenMin" type="number" step="1" placeholder="分" />
      </div>
      <div class="dms-col">
        <label for="zenSec">秒</label>
        <input id="zenSec" type="number" step="any" placeholder="秒" />
      </div>
    </div>

    <label>斜距離（m）</label>
    <input id="slopeDist" type="number" step="any" />

    <label>器械高（m）</label>
    <input id="hi" type="number" step="any" />

    <label>プリズム高（m）</label>
    <input id="hp" type="number" step="any" value="0" />

    <button onclick="calc()">計算</button>
    <button class="secondary" onclick="addCurrentResultToList()">一覧に追加</button>

    <div class="note">
      ※ X＝北、Y＝東。挟角は後視方向を基準に右回り。<br>
      ※ 鉛直角は「上が0°、水平が90°、下が180°」として計算。
    </div>

    <div id="result" class="result">ここに結果が出る</div>
    <div id="addMessage" class="success"></div>
  </section>

  <!-- リスト表示画面 -->
  <section id="listScreen" class="screen">
    <div class="top-actions">
      <button class="secondary" onclick="showScreen('homeScreen')">ホームへ戻る</button>
    </div>

    <h2>リスト表示</h2>

    <button onclick="manualAdd()">手打ち追加</button>

    <div id="listInfo" class="note"></div>
    <div id="recordList"></div>

    <button class="danger" onclick="clearAllRecords()">全件削除</button>
  </section>

  <!-- エクスポート画面 -->
  <section id="exportScreen" class="screen">
    <div class="top-actions">
      <button class="secondary" onclick="showScreen('homeScreen')">ホームへ戻る</button>
    </div>

    <h2>リストエクスポート</h2>
    <div class="note">
      ※ 現在スマホ内に保存されているリストをCSVで出力します。
    </div>
    <button onclick="exportCsv()">CSVエクスポート</button>
    <div id="exportMessage" class="success"></div>
  </section>

  <!-- インポート画面 -->
  <section id="importScreen" class="screen">
    <div class="top-actions">
      <button class="secondary" onclick="showScreen('homeScreen')">ホームへ戻る</button>
    </div>

    <h2>リストインポート</h2>
    <div class="note">
      ※ CSVを読み込んで、既存リストへ追加します。<br>
      ※ 既存データは消えません。
    </div>

    <input id="csvFileInput" class="hidden-file-input" type="file" accept=".csv,text/csv" onchange="importCsvFile(event)" />
    <button onclick="document.getElementById('csvFileInput').click()">CSVファイルを選択</button>

    <div id="importMessage" class="success"></div>
  </section>

  <script>
    const STORAGE_KEY = "ts_coordinate_records_v3";
    let currentCalculatedRecord = null;

    function showScreen(screenId) {
      const screens = document.querySelectorAll(".screen");
      screens.forEach(screen => screen.classList.remove("active"));
      document.getElementById(screenId).classList.add("active");
    }

    function openCalcScreen() {
      loadPointSelectors();
      showScreen("calcScreen");
    }

    function showListScreen() {
      renderRecordList();
      showScreen("listScreen");
    }

    function getRecords() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function degToRad(deg) {
      return deg * Math.PI / 180;
    }

    function radToDeg(rad) {
      return rad * 180 / Math.PI;
    }

    function normalizeDeg(deg) {
      let result = deg % 360;
      if (result < 0) result += 360;
      return result;
    }

    function dmsToDeg(deg, min, sec) {
      return deg + min / 60 + sec / 3600;
    }

    function calcAzimuthFromNorth(x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const rad = Math.atan2(dy, dx);
      return normalizeDeg(radToDeg(rad));
    }

    function loadPointSelectors() {
      const records = getRecords();
      const instSelect = document.getElementById("instSelect");
      const bsSelect = document.getElementById("bsSelect");

      instSelect.innerHTML = '<option value="">選択してください</option>';
      bsSelect.innerHTML = '<option value="">選択してください</option>';

      records.forEach((record, index) => {
        const label = `${record.pointName} （X:${Number(record.x).toFixed(3)}, Y:${Number(record.y).toFixed(3)}, Z:${Number(record.z).toFixed(3)}）`;

        const opt1 = document.createElement("option");
        opt1.value = index;
        opt1.textContent = label;
        instSelect.appendChild(opt1);

        const opt2 = document.createElement("option");
        opt2.value = index;
        opt2.textContent = label;
        bsSelect.appendChild(opt2);
      });
    }

    function applySelectedPoint(type) {
      const records = getRecords();
      const select = type === "inst"
        ? document.getElementById("instSelect")
        : document.getElementById("bsSelect");

      const idx = select.value;
      if (idx === "") return;

      const record = records[Number(idx)];
      if (!record) return;

      if (type === "inst") {
        document.getElementById("x0").value = Number(record.x).toFixed(3);
        document.getElementById("y0").value = Number(record.y).toFixed(3);
        document.getElementById("z0").value = Number(record.z).toFixed(3);
      } else {
        document.getElementById("xb").value = Number(record.x).toFixed(3);
        document.getElementById("yb").value = Number(record.y).toFixed(3);
      }
    }

    function showError(message) {
      document.getElementById("result").innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
      currentCalculatedRecord = null;
    }

    function calc() {
      const pointName = document.getElementById("pointName").value.trim();
      const x0 = parseFloat(document.getElementById("x0").value);
      const y0 = parseFloat(document.getElementById("y0").value);
      const z0 = parseFloat(document.getElementById("z0").value);
      const xb = parseFloat(document.getElementById("xb").value);
      const yb = parseFloat(document.getElementById("yb").value);

      const angleDeg = parseFloat(document.getElementById("angleDeg").value) || 0;
      const angleMin = parseFloat(document.getElementById("angleMin").value) || 0;
      const angleSec = parseFloat(document.getElementById("angleSec").value) || 0;

      const zenDeg = parseFloat(document.getElementById("zenDeg").value) || 0;
      const zenMin = parseFloat(document.getElementById("zenMin").value) || 0;
      const zenSec = parseFloat(document.getElementById("zenSec").value) || 0;

      const slopeDist = parseFloat(document.getElementById("slopeDist").value);
      const hi = parseFloat(document.getElementById("hi").value);
      const hp = parseFloat(document.getElementById("hp").value);

      document.getElementById("addMessage").textContent = "";

      if (!pointName) {
        showError("点名を入力してください。");
        return;
      }

      if (
        isNaN(x0) || isNaN(y0) || isNaN(z0) ||
        isNaN(xb) || isNaN(yb) ||
        isNaN(slopeDist) || isNaN(hi) || isNaN(hp)
      ) {
        showError("未入力または数値でない項目があります。");
        return;
      }

      if (x0 === xb && y0 === yb) {
        showError("器械点と後視点が同じ座標です。方位角を計算できません。");
        return;
      }

      if (
        angleMin < 0 || angleMin >= 60 ||
        angleSec < 0 || angleSec >= 60 ||
        zenMin < 0 || zenMin >= 60 ||
        zenSec < 0 || zenSec >= 60
      ) {
        showError("分・秒は 0以上60未満で入力してください。");
        return;
      }

      const angle = dmsToDeg(angleDeg, angleMin, angleSec);
      const verticalAngle = dmsToDeg(zenDeg, zenMin, zenSec);

      const backsightAz = calcAzimuthFromNorth(x0, y0, xb, yb);
      const targetAz = normalizeDeg(backsightAz + angle);

      const targetAzRad = degToRad(targetAz);
      const verticalAngleRad = degToRad(verticalAngle);

      const horizontalDist = slopeDist * Math.sin(verticalAngleRad);
      const x = x0 + horizontalDist * Math.cos(targetAzRad);
      const y = y0 + horizontalDist * Math.sin(targetAzRad);
      const deltaZ = slopeDist * Math.cos(verticalAngleRad);
      const z = z0 + hi + deltaZ - hp;

      currentCalculatedRecord = {
        pointName,
        x0, y0, z0,
        xb, yb,
        angle,
        verticalAngle,
        slopeDist,
        horizontalDist,
        deltaZ,
        hi,
        hp,
        x,
        y,
        z,
        createdAt: new Date().toISOString(),
        type: "calc"
      };

      document.getElementById("result").innerHTML =
        `<div class="big">
          計算座標 X: ${x.toFixed(3)}<br>
          計算座標 Y: ${y.toFixed(3)}<br>
          計算座標 Z: ${z.toFixed(3)}
        </div>
        <div class="small">
          点名: ${escapeHtml(pointName)}<br>
          挟角: ${angle.toFixed(6)}°<br>
          鉛直角: ${verticalAngle.toFixed(6)}°<br>
          後視方位角: ${backsightAz.toFixed(4)}°<br>
          観測方位角: ${targetAz.toFixed(4)}°<br>
          斜距離: ${slopeDist.toFixed(3)} m<br>
          水平距離: ${horizontalDist.toFixed(3)} m<br>
          高低差: ${deltaZ.toFixed(3)} m
        </div>`;
    }

    function addCurrentResultToList() {
      const addMessage = document.getElementById("addMessage");
      addMessage.textContent = "";

      if (!currentCalculatedRecord) {
        addMessage.textContent = "先に計算してください。";
        return;
      }

      const records = getRecords();
      records.push(currentCalculatedRecord);
      saveRecords(records);

      addMessage.textContent = "一覧に追加しました。";
      incrementPointName();
      loadPointSelectors();
    }

    function incrementPointName() {
      const pointNameInput = document.getElementById("pointName");
      const currentName = pointNameInput.value.trim();
      const match = currentName.match(/^(.*?)(\d+)$/);
      if (!match) return;

      const prefix = match[1];
      const numberText = match[2];
      const nextNumber = String(parseInt(numberText, 10) + 1).padStart(numberText.length, "0");
      pointNameInput.value = prefix + nextNumber;
    }

    function renderRecordList() {
      const records = getRecords();
      document.getElementById("listInfo").textContent = `保存件数: ${records.length} 件`;

      const recordList = document.getElementById("recordList");
      if (records.length === 0) {
        recordList.innerHTML = '<div class="note">まだデータはありません。</div>';
        return;
      }

      recordList.innerHTML = records.map((record, index) => `
        <div class="card">
          <div><strong>${index + 1}. ${escapeHtml(record.pointName || "")}</strong></div>
          <div>
            X: ${Number(record.x).toFixed(3)}<br>
            Y: ${Number(record.y).toFixed(3)}<br>
            Z: ${Number(record.z).toFixed(3)}
          </div>
          <div class="list-buttons">
            <button class="danger" onclick="deleteRecord(${index})">削除</button>
          </div>
        </div>
      `).join("");
    }

    function deleteRecord(index) {
      const records = getRecords();
      const target = records[index];
      if (!target) return;

      const ok = confirm(`${target.pointName || "この点"} を削除しますか？`);
      if (!ok) return;

      records.splice(index, 1);
      saveRecords(records);
      renderRecordList();
      loadPointSelectors();
    }

    function manualAdd() {
      const pointName = prompt("点名を入力してください");
      if (!pointName) return;

      const x = prompt("Xを入力してください");
      const y = prompt("Yを入力してください");
      const z = prompt("Zを入力してください");

      if (x === null || y === null || z === null) return;

      const nx = Number(x);
      const ny = Number(y);
      const nz = Number(z);

      if (!isFinite(nx) || !isFinite(ny) || !isFinite(nz)) {
        alert("X・Y・Zは数値で入力してください。");
        return;
      }

      const records = getRecords();
      records.push({
        pointName,
        x: nx,
        y: ny,
        z: nz,
        createdAt: new Date().toISOString(),
        type: "manual"
      });
      saveRecords(records);
      renderRecordList();
      loadPointSelectors();
    }

    function clearAllRecords() {
      const ok = confirm("保存されている全データを削除します。よろしいですか？");
      if (!ok) return;
      saveRecords([]);
      renderRecordList();
      loadPointSelectors();
    }

    function exportCsv() {
      const records = getRecords();
      const exportMessage = document.getElementById("exportMessage");

      if (records.length === 0) {
        exportMessage.textContent = "エクスポートするデータがありません。";
        return;
      }

      const headers = ["点名", "X", "Y", "Z", "登録日時", "種別"];
      const rows = records.map(record => [
        record.pointName || "",
        record.x ?? "",
        record.y ?? "",
        record.z ?? "",
        record.createdAt || "",
        record.type || ""
      ]);

      const csvText = [headers, ...rows]
        .map(row => row.map(csvEscape).join(","))
        .join("\r\n");

      const bom = "\uFEFF";
      const blob = new Blob([bom + csvText], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      const now = new Date();
      const fileName =
        "ts_list_" +
        now.getFullYear() +
        String(now.getMonth() + 1).padStart(2, "0") +
        String(now.getDate()).padStart(2, "0") +
        "_" +
        String(now.getHours()).padStart(2, "0") +
        String(now.getMinutes()).padStart(2, "0") +
        ".csv";

      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      exportMessage.textContent = "CSVをエクスポートしました。";
    }

    function csvEscape(value) {
      const text = value == null ? "" : String(value);
      return '"' + text.replaceAll('"', '""') + '"';
    }

    function importCsvFile(event) {
      const file = event.target.files[0];
      const importMessage = document.getElementById("importMessage");
      importMessage.textContent = "";

      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const text = String(e.target.result || "");
          const importedRecords = parseCsvToRecords(text);

          if (importedRecords.length === 0) {
            importMessage.textContent = "取り込めるデータがありませんでした。";
            return;
          }

          const existingRecords = getRecords();
          const mergedRecords = existingRecords.concat(importedRecords);
          saveRecords(mergedRecords);
          loadPointSelectors();

          importMessage.textContent = importedRecords.length + " 件を追加しました。";
        } catch (error) {
          importMessage.textContent = "CSVの読み込みに失敗しました。形式を確認してください。";
        } finally {
          document.getElementById("csvFileInput").value = "";
        }
      };

      reader.readAsText(file, "UTF-8");
    }

    function parseCsvToRecords(csvText) {
      const rows = parseCsv(csvText);
      if (rows.length <= 1) return [];

      const records = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row || row.length === 0 || row.every(cell => String(cell).trim() === "")) {
          continue;
        }

        const pointName = row[0] || "";
        const x = parseFloat(row[1]);
        const y = parseFloat(row[2]);
        const z = parseFloat(row[3]);
        const createdAt = row[4] || new Date().toISOString();
        const type = row[5] || "import";

        if (!isFinite(x) || !isFinite(y) || !isFinite(z)) {
          continue;
        }

        records.push({ pointName, x, y, z, createdAt, type });
      }

      return records;
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      text = text.replace(/^\uFEFF/, "");

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (inQuotes) {
          if (char === '"' && nextChar === '"') {
            cell += '"';
            i++;
          } else if (char === '"') {
            inQuotes = false;
          } else {
            cell += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ",") {
            row.push(cell);
            cell = "";
          } else if (char === "\n") {
            row.push(cell.replace(/\r$/, ""));
            rows.push(row);
            row = [];
            cell = "";
          } else {
            cell += char;
          }
        }
      }

      row.push(cell.replace(/\r$/, ""));
      rows.push(row);

      return rows;
    }

    loadPointSelectors();
  </script>

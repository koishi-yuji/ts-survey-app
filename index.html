<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TS座標計算</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      max-width: 420px;
      margin: auto;
      line-height: 1.5;
    }
    h2 {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
      font-weight: bold;
    }
    input {
      width: 100%;
      margin-bottom: 8px;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }
    .dms-row {
      display: flex;
      gap: 8px;
    }
    .dms-row div {
      flex: 1;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      margin-top: 18px;
      cursor: pointer;
    }
    .result {
      margin-top: 24px;
      padding: 12px;
      border: 1px solid #ccc;
      background: #f8f8f8;
      font-size: 17px;
      font-weight: bold;
      white-space: pre-line;
    }
    .note {
      margin-top: 8px;
      color: #555;
      font-size: 13px;
    }
  </style>
</head>
<body>

<h2>TS座標計算（後視点・DMS対応）</h2>

<label>器械点 X（北）</label>
<input id="x0" type="number" step="any" />

<label>器械点 Y（東）</label>
<input id="y0" type="number" step="any" />

<label>後視点 X（北）</label>
<input id="xb" type="number" step="any" />

<label>後視点 Y（東）</label>
<input id="yb" type="number" step="any" />

<label>水平角（°′″）</label>
<div class="dms-row">
  <div>
    <input id="hzDeg" type="number" step="1" placeholder="度" />
  </div>
  <div>
    <input id="hzMin" type="number" step="1" placeholder="分" />
  </div>
  <div>
    <input id="hzSec" type="number" step="any" placeholder="秒" />
  </div>
</div>

<label>距離（m）</label>
<input id="dist" type="number" step="any" />

<button onclick="calc()">計算</button>

<div class="note">
  ※ X＝北、Y＝東。水平角は後視方向を基準に右回りで読んだ角として計算。
</div>

<div class="result" id="result">ここに結果が出る</div>

<script>
function degToRad(deg) {
  return deg * Math.PI / 180;
}

function radToDeg(rad) {
  return rad * 180 / Math.PI;
}

function normalizeDeg(deg) {
  let result = deg % 360;
  if (result < 0) result += 360;
  return result;
}

function dmsToDeg(deg, min, sec) {
  return deg + min / 60 + sec / 3600;
}

function calcAzimuthFromNorth(x1, y1, x2, y2) {
  const dx = x2 - x1; // 北方向成分
  const dy = y2 - y1; // 東方向成分

  // 北を0°、右回り
  const rad = Math.atan2(dy, dx);
  return normalizeDeg(radToDeg(rad));
}

function calc() {
  const x0 = parseFloat(document.getElementById("x0").value);
  const y0 = parseFloat(document.getElementById("y0").value);
  const xb = parseFloat(document.getElementById("xb").value);
  const yb = parseFloat(document.getElementById("yb").value);

  const hzDeg = parseFloat(document.getElementById("hzDeg").value) || 0;
  const hzMin = parseFloat(document.getElementById("hzMin").value) || 0;
  const hzSec = parseFloat(document.getElementById("hzSec").value) || 0;

  const dist = parseFloat(document.getElementById("dist").value);
  const result = document.getElementById("result");

  if (
    isNaN(x0) || isNaN(y0) ||
    isNaN(xb) || isNaN(yb) ||
    isNaN(dist)
  ) {
    result.innerText = "未入力または数値でない項目があります。";
    return;
  }

  if (x0 === xb && y0 === yb) {
    result.innerText = "器械点と後視点が同じ座標です。方位角を計算できません。";
    return;
  }

  if (hzMin < 0 || hzMin >= 60 || hzSec < 0 || hzSec >= 60) {
    result.innerText = "分・秒は 0以上60未満で入力してください。";
    return;
  }

  const hz = dmsToDeg(hzDeg, hzMin, hzSec);

  const backsightAz = calcAzimuthFromNorth(x0, y0, xb, yb);
  const targetAz = normalizeDeg(backsightAz + hz);
  const rad = degToRad(targetAz);

  // X=北, Y=東
  const x = x0 + dist * Math.cos(rad);
  const y = y0 + dist * Math.sin(rad);

  result.innerText =
    "水平角: " + hz.toFixed(6) + "°\n" +
    "後視方位角: " + backsightAz.toFixed(4) + "°\n" +
    "観測方位角: " + targetAz.toFixed(4) + "°\n" +
    "計算座標 X: " + x.toFixed(3) + "\n" +
    "計算座標 Y: " + y.toFixed(3);
}
</script>

</body>
</html>

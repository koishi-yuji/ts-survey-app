<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TS座標計算</title>

<style>
body { font-family: sans-serif; padding:16px; max-width:520px; margin:auto; }
h1,h2 { margin-bottom:10px; }

.screen { display:none; }
.screen.active { display:block; }

label { font-weight:bold; display:block; margin-top:10px; }
input, select {
  width:100%; padding:10px; margin-bottom:6px;
  font-size:16px; border:1px solid #bbb; border-radius:6px;
}

button {
  width:100%; padding:12px; margin-top:10px;
  font-size:17px; border:none; border-radius:8px;
  background:#222; color:#fff;
}

.secondary { background:#666; }
.danger { background:#8b1e1e; }

.result { margin-top:15px; padding:12px; border:1px solid #ccc; background:#f8f8f8; border-radius:8px; }
.big { font-size:22px; font-weight:bold; }
.small { font-size:14px; color:#555; margin-top:10px; }

.card {
  border:1px solid #ddd; border-radius:8px;
  padding:10px; margin-bottom:8px;
}

</style>
</head>

<body>

<!-- 🏠 HOME -->
<div id="home" class="screen active">
<h1>TSツール</h1>
<button onclick="go('calc')">TS計算座標</button>
<button onclick="showList()">リスト表示</button>
<button onclick="go('export')">CSVエクスポート</button>
<button onclick="go('import')">CSVインポート</button>
</div>

<!-- 🧮 CALC -->
<div id="calc" class="screen">

<button class="secondary" onclick="go('home')">← 戻る</button>

<h2>TS計算</h2>

<label>点名</label>
<input id="name">

<label>器械点（選択）</label>
<select id="instSelect" onchange="applyPoint(this,'inst')"></select>

<label>X</label><input id="x0">
<label>Y</label><input id="y0">
<label>Z</label><input id="z0">

<label>後視点（選択）</label>
<select id="bsSelect" onchange="applyPoint(this,'bs')"></select>

<label>X</label><input id="xb">
<label>Y</label><input id="yb">

<label>挟角（度）</label><input id="ang">

<label>鉛直角（上0°）</label><input id="zen">

<label>斜距離</label><input id="sd">

<label>器械高</label><input id="hi">
<label>プリズム高</label><input id="hp" value="0">

<button onclick="calc()">計算</button>
<button class="secondary" onclick="save()">一覧に追加</button>

<div id="result" class="result"></div>

</div>

<!-- 📋 LIST -->
<div id="list" class="screen">

<button class="secondary" onclick="go('home')">← 戻る</button>

<h2>リスト</h2>

<button onclick="manualAdd()">手動追加</button>

<div id="listArea"></div>

<button class="danger" onclick="clearAll()">全削除</button>

</div>

<!-- 📤 EXPORT -->
<div id="export" class="screen">
<button class="secondary" onclick="go('home')">← 戻る</button>
<h2>CSVエクスポート</h2>
<button onclick="exportCSV()">出力</button>
</div>

<!-- 📥 IMPORT -->
<div id="import" class="screen">
<button class="secondary" onclick="go('home')">← 戻る</button>
<h2>CSVインポート</h2>
<input type="file" onchange="importCSV(event)">
</div>

<script>

const KEY="tsdata";
let current=null;

function go(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="calc") loadSelect();
}

function get(){ return JSON.parse(localStorage.getItem(KEY)||"[]"); }
function set(v){ localStorage.setItem(KEY,JSON.stringify(v)); }

function loadSelect(){
  const data=get();
  const inst=document.getElementById("instSelect");
  const bs=document.getElementById("bsSelect");

  inst.innerHTML="<option value=''>選択</option>";
  bs.innerHTML="<option value=''>選択</option>";

  data.forEach((d,i)=>{
    const opt=`<option value="${i}">${d.name}</option>`;
    inst.innerHTML+=opt;
    bs.innerHTML+=opt;
  });
}

function applyPoint(sel,type){
  const data=get();
  const d=data[sel.value];
  if(!d) return;

  if(type==="inst"){
    x0.value=d.x; y0.value=d.y; z0.value=d.z;
  }else{
    xb.value=d.x; yb.value=d.y;
  }
}

function calc(){

  const x=Number(x0.value);
  const y=Number(y0.value);
  const z=Number(z0.value);

  const xb_=Number(xb.value);
  const yb_=Number(yb.value);

  const ang=Number(angInput());
  const zen=Number(zenInput());
  const sd_=Number(sd.value);
  const hi_=Number(hi.value);
  const hp_=Number(hp.value);

  const az=Math.atan2(yb_-y,xb_-x);
  const az2=az + ang*Math.PI/180;

  const h=sd_*Math.sin(zen*Math.PI/180);

  const nx=x + h*Math.cos(az2);
  const ny=y + h*Math.sin(az2);
  const nz=z + hi_ + sd_*Math.cos(zen*Math.PI/180) - hp_;

  current={name:name.value,x:nx,y:ny,z:nz};

  result.innerHTML=`
  <div class="big">
  X:${nx.toFixed(3)}<br>
  Y:${ny.toFixed(3)}<br>
  Z:${nz.toFixed(3)}
  </div>
  <div class="small">
  挟角:${ang}<br>
  鉛直角:${zen}
  </div>
  `;
}

function angInput(){ return document.getElementById("ang").value||0; }
function zenInput(){ return document.getElementById("zen").value||0; }

function save(){
  if(!current) return;

  const d=get();
  d.push(current);
  set(d);

  autoName();
}

function autoName(){
  const v=name.value;
  const m=v.match(/(.*?)(\d+)$/);
  if(!m) return;
  name.value=m[1]+(parseInt(m[2])+1);
}

function showList(){
  go("list");
  const d=get();
  listArea.innerHTML="";
  d.forEach((r,i)=>{
    listArea.innerHTML+=`
    <div class="card">
    ${i+1}. ${r.name}<br>
    X:${r.x.toFixed(3)}<br>
    Y:${r.y.toFixed(3)}<br>
    Z:${r.z.toFixed(3)}
    </div>`;
  });
}

function manualAdd(){
  const n=prompt("点名");
  const x=prompt("X");
  const y=prompt("Y");
  const z=prompt("Z");

  if(!n) return;

  const d=get();
  d.push({name:n,x:Number(x),y:Number(y),z:Number(z)});
  set(d);
  showList();
}

function clearAll(){
  if(confirm("削除する？")) set([]);
  showList();
}

function exportCSV(){
  const d=get();
  let csv="点名,X,Y,Z\n";
  d.forEach(r=>{
    csv+=`${r.name},${r.x},${r.y},${r.z}\n`;
  });

  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="ts.csv";
  a.click();
}

function importCSV(e){
  const file=e.target.files[0];
  const r=new FileReader();

  r.onload=()=>{
    const lines=r.result.split("\n").slice(1);
    const d=get();

    lines.forEach(l=>{
      const c=l.split(",");
      if(c.length>=4){
        d.push({
          name:c[0],
          x:Number(c[1]),
          y:Number(c[2]),
          z:Number(c[3])
        });
      }
    });

    set(d);
    alert("追加完了");
  };

  r.readAsText(file);
}

</script>
</body>
</html>

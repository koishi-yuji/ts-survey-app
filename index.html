<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TS座標計算</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 16px;
      max-width: 520px;
      margin: auto;
      line-height: 1.5;
      background: #ffffff;
      color: #111;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 14px;
    }

    h3 {
      font-size: 16px;
      margin-top: 18px;
      margin-bottom: 10px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    input {
      width: 100%;
      margin-bottom: 8px;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
      border: 1px solid #bbb;
      border-radius: 6px;
      background: #fff;
    }

    .dms-row {
      display: flex;
      gap: 8px;
      align-items: end;
    }

    .dms-col {
      flex: 1;
    }

    .dms-col label {
      margin-top: 0;
      font-weight: normal;
      font-size: 14px;
      color: #555;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 17px;
      margin-top: 10px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #222;
      color: #fff;
    }

    button.secondary {
      background: #666;
    }

    button.danger {
      background: #8b1e1e;
    }

    .menu-button {
      margin-bottom: 12px;
      font-size: 18px;
      padding: 14px;
    }

    .note {
      margin-top: 10px;
      color: #555;
      font-size: 13px;
    }

    .result {
      margin-top: 20px;
      padding: 14px;
      border: 1px solid #ccc;
      background: #f8f8f8;
      border-radius: 8px;
    }

    .big-result {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .small-result {
      font-size: 14px;
      color: #555;
      line-height: 1.8;
      border-top: 1px solid #ddd;
      padding-top: 12px;
    }

    .error {
      color: #b00020;
      font-weight: bold;
      font-size: 16px;
    }

    .success {
      color: #0b6b2a;
      font-weight: bold;
      font-size: 15px;
      margin-top: 10px;
    }

    .list-info {
      margin-bottom: 12px;
      font-size: 14px;
      color: #555;
    }

    .record-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fafafa;
    }

    .record-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .record-coord {
      font-size: 16px;
      line-height: 1.7;
    }

    .record-meta {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    .top-actions button {
      margin-top: 0;
    }

    .inline-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .inline-actions button {
      margin-top: 0;
    }

    .hidden-file-input {
      display: none;
    }
  </style>
</head>
<body>

  <!-- ホーム画面 -->
  <section id="homeScreen" class="screen active">
    <h1>TSツール</h1>
    <button class="menu-button" onclick="showScreen('calcScreen')">TS計算座標</button>
    <button class="menu-button" onclick="showListScreen()">リスト表示</button>
    <button class="menu-button" onclick="showScreen('exportScreen')">リストエクスポート</button>
    <button class="menu-button" onclick="showScreen('importScreen')">リストインポート</button>
    <div class="note">
      ※ スマホ内に保存します。<br>
      ※ CSVインポートは追加です。既存データは消えません。
    </div>
  </section>

  <!-- 計算画面 -->
  <section id="calcScreen" class="screen">
    <div class="top-actions">
      <button class="secondary" onclick="showScreen('homeScreen')">ホームへ戻る</button>
    </div>

    <h2>TS計算座標</h2>

    <label>点名</label>
    <input id="pointName" type="text" placeholder="例: A1" />

    <label>器械点 X（北）</label>
    <input id="x0" type="number" step="any" />

    <label>器械点 Y（東）</label>
    <input id="y0" type="number" step="any" />

    <label>器械点 Z</label>
    <input id="z0" type="number" step="any" />

    <label>後視点 X（北）</label>
    <input id="xb" type="number" step="any" />

    <label>後視点 Y（東）</label>
    <input id="yb" type="number" step="any" />

    <label>挟角</label>
    <div class="dms-row">
      <div class="dms-col">
        <label for="angleDeg">度</label>
        <input id="angleDeg" type="number" step="1" placeholder="度" />
      </div>
      <div class="dms-col">
        <label for="angleMin">分</label>
        <input id="angleMin" type="number" step="1" placeholder="分" />
      </div>
      <div class="dms-col">
        <label for="angleSec">秒</label>
        <input id="angleSec" type="number" step="any" placeholder="秒" />
      </div>
    </div>

    <label>鉛直角（上0°）</label>
    <div class="dms-row">
      <div class="dms-col">
        <label for="zenDeg">度</label>
        <input id="zenDeg" type="number" step="1" placeholder="度" />
      </div>
      <div class="dms-col">
        <label for="zenMin">分</label>
        <input id="zenMin" type="number" step="1" placeholder="分" />
      </div>
      <div class="dms-col">
        <label for="zenSec">秒</label>
        <input id="zenSec" type="number" step="any" placeholder="秒" />
      </div>
    </div>

    <label>斜距離（m）</label>
    <input id="slopeDist" type="number" step="any" />

    <label>器械高（m）</label>
    <input id="hi" type="number" step="any" />

    <label>プリズム高（m）</label>
    <input id="hp" type="number" step="any" value="0" />

    <button onclick="calc()">計算</button>
    <button class="secondary" onclick="addCurrentResultToList()">一覧に追加</button>

    <div class="note">
      ※ X＝北、Y＝東。挟角は後視方向を基準に右回り。<br>
      ※ 鉛直角は「上が0°、水平が90°、下が180°」として計算。
    </div>

    <div class="result" id="result">ここに結果が出る</div>
    <div id="addMessage" class="success"></div>
  </section>

  <!-- リスト表示画面 -->
  <section id="listScreen" class="screen">
    <div class="top-actions">
      <button class="secondary" onclick="showScreen('homeScreen')">ホームへ戻る</button>
    </div>

    <h2>リスト表示</h2>
    <div id="listInfo" class="list-info"></div>
    <div id="recordList"></div>

    <button class="danger" onclick="clearAllRecords()">全件削除</button>
  </section>

  <!-- エクスポート画面 -->
  <section id="exportScreen" class="screen">
    <div class="top-actions">
      <button class="secondary" onclick="showScreen('homeScreen')">ホームへ戻る</button>
    </div>

    <h2>リストエクスポート</h2>
    <div class="note">
      ※ 現在スマホ内に保存されているリストをCSVで出力します。
    </div>
    <button onclick="exportCsv()">CSVエクスポート</button>
    <div id="exportMessage" class="success"></div>
  </section>

  <!-- インポート画面 -->
  <section id="importScreen" class="screen">
    <div class="top-actions">
      <button class="secondary" onclick="showScreen('homeScreen')">ホームへ戻る</button>
    </div>

    <h2>リストインポート</h2>
    <div class="note">
      ※ CSVを読み込んで、既存リストへ追加します。<br>
      ※ 既存データは消えません。
    </div>

    <input id="csvFileInput" class="hidden-file-input" type="file" accept=".csv,text/csv" onchange="importCsvFile(event)" />
    <button onclick="document.getElementById('csvFileInput').click()">CSVファイルを選択</button>

    <div id="importMessage" class="success"></div>
  </section>

  <script>
    const STORAGE_KEY = "ts_coordinate_records_v1";
    let currentCalculatedRecord = null;

    function showScreen(screenId) {
      const screens = document.querySelectorAll(".screen");
      screens.forEach(screen => screen.classList.remove("active"));
      document.getElementById(screenId).classList.add("active");

      if (screenId === "listScreen") {
        renderRecordList();
      }
    }

    function showListScreen() {
      renderRecordList();
      showScreen("listScreen");
    }

    function getRecords() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function saveRecords(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    function degToRad(deg) {
      return deg * Math.PI / 180;
    }

    function radToDeg(rad) {
      return rad * 180 / Math.PI;
    }

    function normalizeDeg(deg) {
      let result = deg % 360;
      if (result < 0) result += 360;
      return result;
    }

    function dmsToDeg(deg, min, sec) {
      return deg + min / 60 + sec / 3600;
    }

    function calcAzimuthFromNorth(x1, y1, x2, y2) {
      const dx = x2 - x1; // 北方向成分
      const dy = y2 - y1; // 東方向成分
      const rad = Math.atan2(dy, dx);
      return normalizeDeg(radToDeg(rad));
    }

    function showError(message) {
      const result = document.getElementById("result");
      result.innerHTML = "<div class='error'>" + message + "</div>";
      currentCalculatedRecord = null;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function calc() {
      const pointName = document.getElementById("pointName").value.trim();
      const x0 = parseFloat(document.getElementById("x0").value);
      const y0 = parseFloat(document.getElementById("y0").value);
      const z0 = parseFloat(document.getElementById("z0").value);
      const xb = parseFloat(document.getElementById("xb").value);
      const yb = parseFloat(document.getElementById("yb").value);

      const angleDeg = parseFloat(document.getElementById("angleDeg").value) || 0;
      const angleMin = parseFloat(document.getElementById("angleMin").value) || 0;
      const angleSec = parseFloat(document.getElementById("angleSec").value) || 0;

      const zenDeg = parseFloat(document.getElementById("zenDeg").value) || 0;
      const zenMin = parseFloat(document.getElementById("zenMin").value) || 0;
      const zenSec = parseFloat(document.getElementById("zenSec").value) || 0;

      const slopeDist = parseFloat(document.getElementById("slopeDist").value);
      const hi = parseFloat(document.getElementById("hi").value);
      const hp = parseFloat(document.getElementById("hp").value);

      document.getElementById("addMessage").textContent = "";

      if (!pointName) {
        showError("点名を入力してください。");
        return;
      }

      if (
        isNaN(x0) || isNaN(y0) || isNaN(z0) ||
        isNaN(xb) || isNaN(yb) ||
        isNaN(slopeDist) || isNaN(hi) || isNaN(hp)
      ) {
        showError("未入力または数値でない項目があります。");
        return;
      }

      if (x0 === xb && y0 === yb) {
        showError("器械点と後視点が同じ座標です。方位角を計算できません。");
        return;
      }

      if (
        angleMin < 0 || angleMin >= 60 ||
        angleSec < 0 || angleSec >= 60 ||
        zenMin < 0 || zenMin >= 60 ||
        zenSec < 0 || zenSec >= 60
      ) {
        showError("分・秒は 0以上60未満で入力してください。");
        return;
      }

      const angle = dmsToDeg(angleDeg, angleMin, angleSec);
      const verticalAngle = dmsToDeg(zenDeg, zenMin, zenSec);

      const backsightAz = calcAzimuthFromNorth(x0, y0, xb, yb);
      const targetAz = normalizeDeg(backsightAz + angle);

      const targetAzRad = degToRad(targetAz);
      const verticalAngleRad = degToRad(verticalAngle);

      const horizontalDist = slopeDist * Math.sin(verticalAngleRad);
      const x = x0 + horizontalDist * Math.cos(targetAzRad);
      const y = y0 + horizontalDist * Math.sin(targetAzRad);
      const deltaZ = slopeDist * Math.cos(verticalAngleRad);
      const z = z0 + hi + deltaZ - hp;

      currentCalculatedRecord = {
        pointName,
        x0, y0, z0,
        xb, yb,
        angle,
        verticalAngle,
        slopeDist,
        horizontalDist,
        deltaZ,
        hi,
        hp,
        x,
        y,
        z,
        createdAt: new Date().toISOString()
      };

      const result = document.getElementById("result");
      result.innerHTML =
        "<div class='big-result'>" +
          "計算座標 X: " + x.toFixed(3) + "<br>" +
          "計算座標 Y: " + y.toFixed(3) + "<br>" +
          "計算座標 Z: " + z.toFixed(3) +
        "</div>" +
        "<div class='small-result'>" +
          "点名: " + escapeHtml(pointName) + "<br>" +
          "挟角: " + angle.toFixed(6) + "°<br>" +
          "鉛直角: " + verticalAngle.toFixed(6) + "°<br>" +
          "後視方位角: " + backsightAz.toFixed(4) + "°<br>" +
          "観測方位角: " + targetAz.toFixed(4) + "°<br>" +
          "斜距離: " + slopeDist.toFixed(3) + " m<br>" +
          "水平距離: " + horizontalDist.toFixed(3) + " m<br>" +
          "高低差: " + deltaZ.toFixed(3) + " m<br>" +
          "器械高: " + hi.toFixed(3) + " m<br>" +
          "プリズム高: " + hp.toFixed(3) + " m" +
        "</div>";
    }

    function addCurrentResultToList() {
      const addMessage = document.getElementById("addMessage");
      addMessage.textContent = "";

      if (!currentCalculatedRecord) {
        addMessage.textContent = "先に計算してください。";
        return;
      }

      const records = getRecords();
      records.push(currentCalculatedRecord);
      saveRecords(records);

      addMessage.textContent = "一覧に追加しました。";
      incrementPointName();
    }

    function incrementPointName() {
      const pointNameInput = document.getElementById("pointName");
      const currentName = pointNameInput.value.trim();

      const match = currentName.match(/^(.*?)(\d+)$/);
      if (!match) return;

      const prefix = match[1];
      const numberText = match[2];
      const nextNumber = String(parseInt(numberText, 10) + 1).padStart(numberText.length, "0");
      pointNameInput.value = prefix + nextNumber;
    }

    function renderRecordList() {
      const records = getRecords();
      const listInfo = document.getElementById("listInfo");
      const recordList = document.getElementById("recordList");

      listInfo.textContent = "保存件数: " + records.length + " 件";

      if (records.length === 0) {
        recordList.innerHTML = "<div class='note'>まだデータはありません。</div>";
        return;
      }

      recordList.innerHTML = records.map((record, index) => {
        return `
          <div class="record-card">
            <div class="record-name">${index + 1}. ${escapeHtml(record.pointName || "")}</div>
            <div class="record-coord">
              X: ${Number(record.x).toFixed(3)}<br>
              Y: ${Number(record.y).toFixed(3)}<br>
              Z: ${Number(record.z).toFixed(3)}
            </div>
            <div class="record-meta">
              登録日時: ${escapeHtml(formatDateTime(record.createdAt))}
            </div>
          </div>
        `;
      }).join("");
    }

    function formatDateTime(isoText) {
      if (!isoText) return "";
      const date = new Date(isoText);
      if (isNaN(date.getTime())) return isoText;
      const yyyy = date.getFullYear();
      const mm = String(date.getMonth() + 1).padStart(2, "0");
      const dd = String(date.getDate()).padStart(2, "0");
      const hh = String(date.getHours()).padStart(2, "0");
      const mi = String(date.getMinutes()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd} ${hh}:${mi}`;
    }

    function clearAllRecords() {
      const ok = confirm("保存されている全データを削除します。よろしいですか？");
      if (!ok) return;
      saveRecords([]);
      renderRecordList();
    }

    function exportCsv() {
      const records = getRecords();
      const exportMessage = document.getElementById("exportMessage");

      if (records.length === 0) {
        exportMessage.textContent = "エクスポートするデータがありません。";
        return;
      }

      const headers = [
        "点名",
        "器械点X",
        "器械点Y",
        "器械点Z",
        "後視点X",
        "後視点Y",
        "挟角",
        "鉛直角",
        "斜距離",
        "水平距離",
        "高低差",
        "器械高",
        "プリズム高",
        "計算座標X",
        "計算座標Y",
        "計算座標Z",
        "登録日時"
      ];

      const rows = records.map(record => [
        record.pointName,
        record.x0,
        record.y0,
        record.z0,
        record.xb,
        record.yb,
        record.angle,
        record.verticalAngle,
        record.slopeDist,
        record.horizontalDist,
        record.deltaZ,
        record.hi,
        record.hp,
        record.x,
        record.y,
        record.z,
        record.createdAt
      ]);

      const csvText = [headers, ...rows]
        .map(row => row.map(csvEscape).join(","))
        .join("\r\n");

      const bom = "\uFEFF";
      const blob = new Blob([bom + csvText], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      const now = new Date();
      const fileName =
        "ts_records_" +
        now.getFullYear() +
        String(now.getMonth() + 1).padStart(2, "0") +
        String(now.getDate()).padStart(2, "0") +
        "_" +
        String(now.getHours()).padStart(2, "0") +
        String(now.getMinutes()).padStart(2, "0") +
        ".csv";

      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);

      exportMessage.textContent = "CSVをエクスポートしました。";
    }

    function csvEscape(value) {
      const text = value == null ? "" : String(value);
      return '"' + text.replaceAll('"', '""') + '"';
    }

    function importCsvFile(event) {
      const file = event.target.files[0];
      const importMessage = document.getElementById("importMessage");
      importMessage.textContent = "";

      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const text = String(e.target.result || "");
          const importedRecords = parseCsvToRecords(text);

          if (importedRecords.length === 0) {
            importMessage.textContent = "取り込めるデータがありませんでした。";
            return;
          }

          const existingRecords = getRecords();
          const mergedRecords = existingRecords.concat(importedRecords);
          saveRecords(mergedRecords);

          importMessage.textContent = importedRecords.length + " 件を追加しました。";
        } catch (error) {
          importMessage.textContent = "CSVの読み込みに失敗しました。形式を確認してください。";
        } finally {
          document.getElementById("csvFileInput").value = "";
        }
      };

      reader.readAsText(file, "UTF-8");
    }

    function parseCsvToRecords(csvText) {
      const rows = parseCsv(csvText);
      if (rows.length <= 1) return [];

      const records = [];
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row || row.length === 0 || row.every(cell => String(cell).trim() === "")) {
          continue;
        }

        const record = {
          pointName: row[0] || "",
          x0: toNumber(row[1]),
          y0: toNumber(row[2]),
          z0: toNumber(row[3]),
          xb: toNumber(row[4]),
          yb: toNumber(row[5]),
          angle: toNumber(row[6]),
          verticalAngle: toNumber(row[7]),
          slopeDist: toNumber(row[8]),
          horizontalDist: toNumber(row[9]),
          deltaZ: toNumber(row[10]),
          hi: toNumber(row[11]),
          hp: toNumber(row[12]),
          x: toNumber(row[13]),
          y: toNumber(row[14]),
          z: toNumber(row[15]),
          createdAt: row[16] || new Date().toISOString()
        };

        if (
          !isFinite(record.x) ||
          !isFinite(record.y) ||
          !isFinite(record.z)
        ) {
          continue;
        }

        records.push(record);
      }

      return records;
    }

    function toNumber(value) {
      const num = parseFloat(value);
      return isNaN(num) ? 0 : num;
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      text = text.replace(/^\uFEFF/, "");

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (inQuotes) {
          if (char === '"' && nextChar === '"') {
            cell += '"';
            i++;
          } else if (char === '"') {
            inQuotes = false;
          } else {
            cell += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ",") {
            row.push(cell);
            cell = "";
          } else if (char === "\n") {
            row.push(cell.replace(/\r$/, ""));
            rows.push(row);
            row = [];
            cell = "";
          } else {
            cell += char;
          }
        }
      }

      row.push(cell.replace(/\r$/, ""));
      rows.push(row);

      return rows;
    }

    // 初期表示時
    renderRecordList();
  </script>
</body>
</html>
